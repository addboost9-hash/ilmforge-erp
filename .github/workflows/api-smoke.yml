name: API Smoke

on:
  workflow_dispatch:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/api-smoke.yml'

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to sqlite
        run: npm run db:push

      - name: Seed demo data
        run: npm run db:seed

      - name: Start backend
        run: node src/server.js > /tmp/backend.log 2>&1 &

      - name: Wait for health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:5000/health > /dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start"
          cat /tmp/backend.log
          exit 1

      - name: Run smoke checks
        env:
          SMOKE_BASE_URL: http://localhost:5000/api/v1
          SMOKE_ADMIN_EMAIL: admin@demo.com
          SMOKE_ADMIN_PASSWORD: Admin@123
        run: npm run smoke:api

      - name: Print backend log on failure
        if: failure()
        run: cat /tmp/backend.log
