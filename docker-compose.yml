version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: edumanage_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: edumanage
      POSTGRES_PASSWORD: edumanage123
      POSTGRES_DB: edumanage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: edumanage_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edumanage_api
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://edumanage:edumanage123@postgres:5432/edumanage
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-this-secret-in-production
      JWT_REFRESH_SECRET: change-this-refresh-secret
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edumanage_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
