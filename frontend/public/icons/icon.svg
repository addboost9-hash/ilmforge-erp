<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1B2F6E"/>
      <stop offset="55%"  stop-color="#0d2056"/>
      <stop offset="100%" stop-color="#091538"/>
    </linearGradient>
    <!-- Gold gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FDE68A"/>
      <stop offset="40%"  stop-color="#F5C518"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <!-- White book gradient -->
    <linearGradient id="book_l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#dbeafe" stop-opacity="0.85"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Drop shadow -->
    <filter id="drop">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#090f1f" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- ── Rounded rect background ── -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- ── Subtle inner glow ring ── -->
  <rect x="10" y="10" width="492" height="492" rx="100"
        fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.22"/>

  <!-- ── Top decorative arc ── -->
  <path d="M 80 20 Q 256 -15 432 20" fill="none" stroke="url(#gold)"
        stroke-width="2.5" opacity="0.18"/>

  <!-- ══ OPEN BOOK — center ══ -->
  <!-- Left page -->
  <path d="M 70 170 C 115 148, 198 145, 256 158 L 256 368 C 198 355, 115 358, 70 380 Z"
        fill="url(#book_l)"/>
  <!-- Right page -->
  <path d="M 442 170 C 397 148, 314 145, 256 158 L 256 368 C 314 355, 397 358, 442 380 Z"
        fill="white" opacity="0.78"/>
  <!-- Book spine shadow -->
  <line x1="256" y1="158" x2="256" y2="368"
        stroke="url(#gold)" stroke-width="10" stroke-linecap="round"/>

  <!-- Left page ruled lines -->
  <path d="M 96 218 Q 172 208 236 214" stroke="#1B2F6E" stroke-width="6" stroke-linecap="round" opacity="0.18"/>
  <path d="M 96 252 Q 172 242 236 248" stroke="#1B2F6E" stroke-width="6" stroke-linecap="round" opacity="0.14"/>
  <path d="M 96 286 Q 172 276 236 282" stroke="#1B2F6E" stroke-width="6" stroke-linecap="round" opacity="0.10"/>
  <path d="M 96 320 Q 172 310 236 316" stroke="#1B2F6E" stroke-width="6" stroke-linecap="round" opacity="0.07"/>

  <!-- Right page ruled lines -->
  <path d="M 416 218 Q 340 208 276 214" stroke="#1B2F6E" stroke-width="6" stroke-linecap="round" opacity="0.18"/>
  <path d="M 416 252 Q 340 242 276 248" stroke="#1B2F6E" stroke-width="6" stroke-linecap="round" opacity="0.14"/>
  <path d="M 416 286 Q 340 276 276 282" stroke="#1B2F6E" stroke-width="6" stroke-linecap="round" opacity="0.10"/>

  <!-- ══ GOLD FLAME ABOVE BOOK ══ -->
  <path d="M 256 60 C 270 80, 283 98, 283 118 A 27 27 0 0 1 229 118 C 229 98 242 80 256 60 Z"
        fill="url(#gold)" filter="url(#glow)"/>
  <path d="M 256 75 C 263 89, 270 103, 270 115 A 14 14 0 0 1 242 115 C 242 103 249 89 256 75 Z"
        fill="white" opacity="0.55"/>
  <!-- inner flame core -->
  <circle cx="256" cy="108" r="7" fill="white" opacity="0.35"/>

  <!-- ══ WORDMARK — "ilm | فورج" ══ -->
  <!-- Clean separator bar -->
  <rect x="248" y="405" width="16" height="3" rx="1.5" fill="url(#gold)" opacity="0.5"/>

  <!-- "ilm" — Latin, bottom-left area -->
  <text x="100" y="472"
        font-family="'Poppins','Montserrat','Arial Black',sans-serif"
        font-size="96"
        font-weight="900"
        fill="white"
        letter-spacing="-2"
        opacity="0.96">
    ilm
  </text>

  <!-- Vertical micro-divider between words -->
  <rect x="268" y="400" width="5" height="68" rx="2.5" fill="url(#gold)" opacity="0.4"/>

  <!-- "فورج" — Urdu Nastaliq, bottom-right, gold gradient -->
  <text x="400" y="468"
        font-family="'Noto Nastaliq Urdu','Jameel Noori Nastaleeq','Arabic Typesetting',serif"
        font-size="88"
        font-weight="700"
        fill="url(#gold)"
        text-anchor="middle"
        direction="rtl"
        filter="url(#glow)">
    فورج
  </text>

  <!-- ══ PK FLAG top-right corner ══ -->
  <rect x="440" y="18" width="54" height="36" rx="5" fill="#01411C" opacity="0.9"/>
  <rect x="440" y="18" width="14" height="36" rx="5" fill="white" opacity="0.95"/>
  <circle cx="470" cy="36" r="8" fill="white" opacity="0.95"/>
  <circle cx="473" cy="34.5" r="6.5" fill="#01411C" opacity="0.95"/>
  <path d="M477 30 l1.1 2.4 2.6.3-1.9 1.8.5 2.5-2.3-1.3-2.3 1.3.5-2.5-1.9-1.8 2.6-.3z"
        fill="white" opacity="0.95"/>
</svg>
